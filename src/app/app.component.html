<header-component />

<main>
  <ul id="users">
    @for (user of users; track user.id) {
      <li>
        <app-user [selected]="user.id === selectedUserId" [user]="user" (select)="onSelectedUser(user.id)" />
      </li>
    }
  </ul>

  @if (selectedUser) {
    <app-ticket [users]="users" [user]="selectedUser"/>
  } @else {
    <p id="fallback">Please select user to show details</p>
  }
</main>

<router-outlet />
